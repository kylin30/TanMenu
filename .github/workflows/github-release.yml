name: GitHub Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: github-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  portable-release:
    name: Build portable app and publish update feed
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Validate tag and product version
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          [xml]$props = Get-Content 'Directory.Build.props' -Raw
          $version = [string]$props.Project.PropertyGroup.Version
          $tag = '${{ github.ref_name }}'

          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "Directory.Build.props Version '$version' is not a three-part numeric version required by Velopack."
          }
          if ($tag -cne "v$version") {
            throw "Release tag '$tag' must exactly match Directory.Build.props Version '$version' (expected 'v$version')."
          }

          Write-Host "Validated portable release $tag."

      - name: Restore
        run: dotnet restore TanMenu.slnx

      - name: Build
        run: dotnet build TanMenu.slnx -c Release --no-restore

      - name: Test
        run: dotnet test tests/TanMenu.Core.Tests/TanMenu.Core.Tests.csproj -c Release --no-build

      - name: Install Velopack CLI
        shell: pwsh
        run: |
          [xml]$props = Get-Content 'Directory.Build.props' -Raw
          $version = [string]$props.Project.PropertyGroup.VelopackVersion
          if ([string]::IsNullOrWhiteSpace($version)) {
            throw 'VelopackVersion is missing from Directory.Build.props.'
          }
          dotnet tool install --tool-path .tools vpk --version $version

      - name: Build portable ZIP and update packages
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'
          & ./scripts/package-portable.ps1 `
            -VpkPath './.tools/vpk.exe' `
            -RepositoryUrl 'https://github.com/${{ github.repository }}' `
            -GitHubToken $env:GITHUB_TOKEN `
            -DownloadPrevious
          if ($LASTEXITCODE -ne 0) {
            throw "Portable packaging failed with exit code $LASTEXITCODE."
          }

          $zips = @(Get-ChildItem 'dist/velopack' -Filter '*-Portable.zip' -File)
          $checksums = @(Get-ChildItem 'dist/velopack' -Filter '*-Portable.zip.sha256' -File)
          $feeds = @(Get-ChildItem 'dist/velopack' -Filter 'releases.win.json' -File)
          # DownloadPrevious intentionally leaves the preceding full package in the output folder
          # so Velopack can build the delta. Validate the package for THIS release instead of
          # rejecting the expected previous-version package.
          [xml]$props = Get-Content 'Directory.Build.props' -Raw
          $version = [string]$props.Project.PropertyGroup.Version
          $packages = @(Get-ChildItem 'dist/velopack' -Filter "TanMenu-$version-full.nupkg" -File)
          $installers = @(Get-ChildItem 'dist/velopack' -Filter '*-Setup.exe' -File)
          if ($zips.Count -ne 1 -or $checksums.Count -ne 1 -or $feeds.Count -ne 1 -or
              $packages.Count -ne 1 -or $installers.Count -ne 0) {
            throw "Unexpected Velopack output: ZIP=$($zips.Count), checksum=$($checksums.Count), feed=$($feeds.Count), full package=$($packages.Count), installer=$($installers.Count)."
          }

      - name: Publish GitHub Release and update feed
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'
          & ./.tools/vpk.exe upload github `
            --outputDir 'dist/velopack' `
            --repoUrl 'https://github.com/${{ github.repository }}' `
            --token $env:GITHUB_TOKEN `
            --publish `
            --tag '${{ github.ref_name }}' `
            --releaseName "TanMenu ${{ github.ref_name }}"
          if ($LASTEXITCODE -ne 0) {
            throw "GitHub Release creation failed with exit code $LASTEXITCODE."
          }

          $checksum = Get-ChildItem 'dist/velopack' -Filter '*-Portable.zip.sha256' -File -ErrorAction Stop
          gh release upload '${{ github.ref_name }}' $checksum.FullName `
            --repo '${{ github.repository }}' `
            --clobber

  store-package:
    name: Build Microsoft Store package
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Validate tag and product version
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          [xml]$props = Get-Content 'Directory.Build.props' -Raw
          $version = [string]$props.Project.PropertyGroup.Version
          $tag = '${{ github.ref_name }}'

          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "Directory.Build.props Version '$version' is not a three-part numeric version."
          }
          if ($tag -cne "v$version") {
            throw "Store package tag '$tag' must match product version '$version'."
          }

      - name: Restore
        run: dotnet restore TanMenu.slnx

      - name: Build Microsoft Store MSIX
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          & ./scripts/package-msix.ps1 -OutputRoot 'dist/store'
          if ($LASTEXITCODE -ne 0) {
            throw "Store packaging failed with exit code $LASTEXITCODE."
          }

          [xml]$props = Get-Content 'Directory.Build.props' -Raw
          $version4 = "$([string]$props.Project.PropertyGroup.Version).0"
          $packages = @(Get-ChildItem 'dist/store' -Filter "TanMenu_${version4}_x64.msix" -File)
          $checksums = @(Get-ChildItem 'dist/store' -Filter "TanMenu_${version4}_x64.msix.sha256" -File)
          if ($packages.Count -ne 1 -or $checksums.Count -ne 1) {
            throw "Unexpected Store output: MSIX=$($packages.Count), checksum=$($checksums.Count)."
          }

      - name: Retain Store submission package
        uses: actions/upload-artifact@v4
        with:
          name: TanMenu-${{ github.ref_name }}-Microsoft-Store
          path: |
            dist/store/*.msix
            dist/store/*.msix.sha256
          if-no-files-found: error
          retention-days: 90
