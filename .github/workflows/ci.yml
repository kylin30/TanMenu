name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    # Windows is required: the app targets net10.0-windows (WPF) and several tests touch real
    # Windows APIs (icon extraction, .lnk resolution, the registry).
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore TanMenu.slnx

      - name: Build
        run: dotnet build TanMenu.slnx -c Release --no-restore

      - name: Test
        run: dotnet test tests/TanMenu.Core.Tests/TanMenu.Core.Tests.csproj -c Release --no-build
