name: Publish to Microsoft Store

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

# Never cancel a Store submission after it has started, and do not publish two versions at once.
concurrency:
  group: microsoft-store-production
  cancel-in-progress: false

env:
  STORE_PRODUCT_ID: 9N1G9796LV6G

jobs:
  build-package:
    name: Build, test, and package
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Validate tag and product version
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          [xml]$props = Get-Content 'Directory.Build.props' -Raw
          $version = [string]$props.Project.PropertyGroup.Version
          $tag = '${{ github.ref_name }}'

          if ($version -notmatch '^\d+\.\d+\.\d+(?:\.\d+)?$') {
            throw "Directory.Build.props Version '$version' is not a three- or four-part numeric Store version."
          }
          if ($tag -cne "v$version") {
            throw "Release tag '$tag' must exactly match Directory.Build.props Version '$version' (expected 'v$version')."
          }

          foreach ($part in $version.Split('.')) {
            if ([int64]$part -gt 65535) {
              throw "Each MSIX version component must be between 0 and 65535: '$version'."
            }
          }

          Write-Host "Validated Store release $tag."

      - name: Restore
        run: dotnet restore TanMenu.slnx

      - name: Build
        run: dotnet build TanMenu.slnx -c Release --no-restore

      - name: Test
        run: dotnet test tests/TanMenu.Core.Tests/TanMenu.Core.Tests.csproj -c Release --no-build

      - name: Build Store MSIX
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          & ./scripts/package-msix.ps1
          if ($LASTEXITCODE -ne 0) {
            throw "MSIX packaging failed with exit code $LASTEXITCODE."
          }

          $packages = @(Get-ChildItem 'dist/store' -Filter '*.msix' -File)
          if ($packages.Count -ne 1) {
            throw "Expected exactly one MSIX package, found $($packages.Count)."
          }

          $hash = Get-FileHash $packages[0].FullName -Algorithm SHA256
          Write-Host "Package: $($packages[0].Name)"
          Write-Host "SHA256:  $($hash.Hash)"

      - name: Upload Store package
        uses: actions/upload-artifact@v4
        with:
          name: tanmenu-store-msix
          path: dist/store/*.msix
          if-no-files-found: error
          retention-days: 14

  publish-store:
    name: Submit to Microsoft Store
    needs: build-package
    runs-on: windows-latest
    timeout-minutes: 30
    environment: production

    steps:
      - name: Download Store package
        uses: actions/download-artifact@v4
        with:
          name: tanmenu-store-msix
          path: dist/store

      - name: Check Store credentials
        shell: pwsh
        env:
          AZURE_AD_TENANT_ID: ${{ secrets.AZURE_AD_TENANT_ID }}
          SELLER_ID: ${{ secrets.SELLER_ID }}
          AZURE_AD_APPLICATION_CLIENT_ID: ${{ secrets.AZURE_AD_APPLICATION_CLIENT_ID }}
          AZURE_AD_APPLICATION_SECRET: ${{ secrets.AZURE_AD_APPLICATION_SECRET }}
        run: |
          $required = @(
            'AZURE_AD_TENANT_ID'
            'SELLER_ID'
            'AZURE_AD_APPLICATION_CLIENT_ID'
            'AZURE_AD_APPLICATION_SECRET'
          )
          $missing = @($required | Where-Object {
            [string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($_))
          })

          if ($missing.Count -gt 0) {
            throw "Missing production Environment secret(s): $($missing -join ', ')."
          }

      - name: Install Microsoft Store Developer CLI
        uses: microsoft/microsoft-store-apppublisher@v1.1

      - name: Authenticate to Partner Center
        shell: pwsh
        env:
          AZURE_AD_TENANT_ID: ${{ secrets.AZURE_AD_TENANT_ID }}
          SELLER_ID: ${{ secrets.SELLER_ID }}
          AZURE_AD_APPLICATION_CLIENT_ID: ${{ secrets.AZURE_AD_APPLICATION_CLIENT_ID }}
          AZURE_AD_APPLICATION_SECRET: ${{ secrets.AZURE_AD_APPLICATION_SECRET }}
        run: |
          $ErrorActionPreference = 'Stop'
          msstore reconfigure `
            --tenantId "$env:AZURE_AD_TENANT_ID" `
            --sellerId "$env:SELLER_ID" `
            --clientId "$env:AZURE_AD_APPLICATION_CLIENT_ID" `
            --clientSecret "$env:AZURE_AD_APPLICATION_SECRET"
          if ($LASTEXITCODE -ne 0) {
            throw "Microsoft Store authentication failed with exit code $LASTEXITCODE."
          }

      - name: Publish package
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $packages = @(Get-ChildItem 'dist/store' -Filter '*.msix' -File)
          if ($packages.Count -ne 1) {
            throw "Expected exactly one downloaded MSIX package, found $($packages.Count)."
          }

          msstore publish $packages[0].FullName -id $env:STORE_PRODUCT_ID
          if ($LASTEXITCODE -ne 0) {
            throw "Microsoft Store submission failed with exit code $LASTEXITCODE."
          }
